<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js TSL template</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <p id="app-error" class="app-error" hidden></p>
    <div class="fake-ui" aria-hidden="true">
        <img class="fake-ui__header" src="/fake_ui/header.png" alt="" width="1920" height="120" decoding="async" />
        <div class="fake-ui__sides">
            <img class="fake-ui__left" src="/fake_ui/left.png" alt="" width="320" height="800" decoding="async" />
            <span class="fake-ui__spacer"></span>
            <img class="fake-ui__right" src="/fake_ui/right.png" alt="" width="320" height="800" decoding="async" />
        </div>
    </div>
    <div class="stage" aria-hidden="true">
        <canvas class="webgl"></canvas>
    </div>
    <script type="module" src="./script.js"></script>
</body>
</html>
